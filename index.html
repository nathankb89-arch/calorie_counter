<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calorie Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

  <div class="container bg-white p-6 rounded-xl shadow-md w-96">
    <h1 class=" text-purple-800 text-2xl font-bold mb-4 text-center">Calorie Counter</h1>

    <!-- Form -->
    <form id="food-form" class="flex flex-col gap-2">
      <input type="text" id="food-name" placeholder="Food name" class="border p-2 rounded" required>
      <input type="number" id="calories" placeholder="Calories" class="border p-2 rounded" required>
      <button class="bg-blue-500 text-white p-2 rounded">Add Food</button>
    </form>

    <!-- List -->
    <ul id="food-list" class="mt-4 space-y-2"></ul>

    <!-- Total -->
    <h2 class="mt-4 text-lg font-semibold">
      Total Calories: <span id="total">0</span>
    </h2>

    <!-- Reset -->
    <button id="reset" class="mt-3 bg-red-500 text-white p-2 rounded w-full">
      Reset
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
