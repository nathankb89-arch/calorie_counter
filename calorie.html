<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calorie Counter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-lg rounded-2xl p-6 w-full max-w-md">
  <h1 class="text-2xl font-bold mb-4 text-center">Calorie Counter</h1>

  <!-- Form -->
  <form id="food-form" class="space-y-3">
    <input id="food-name" type="text" placeholder="Food name" class="w-full p-2 border rounded" required>
    <input id="food-calories" type="number" placeholder="Calories" class="w-full p-2 border rounded" required>
    <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Add Food</button>
  </form>

  <!-- List -->
  <ul id="food-list" class="mt-4 space-y-2"></ul>

  <!-- Total -->
  <div class="mt-4 text-lg font-semibold">Total Calories: <span id="total-calories">0</span></div>

  <!-- Reset -->
  <button id="reset-btn" class="mt-4 w-full bg-red-500 text-white p-2 rounded hover:bg-red-600">Reset</button>
</div>

<script>
// Load from localStorage
let foods = JSON.parse(localStorage.getItem('foods')) || [];

const form = document.getElementById('food-form');
const list = document.getElementById('food-list');
const totalDisplay = document.getElementById('total-calories');
const resetBtn = document.getElementById('reset-btn');

// Save to localStorage
function saveData() {
  localStorage.setItem('foods', JSON.stringify(foods));
}

// Render UI
function renderFoods() {
  list.innerHTML = '';

  foods.forEach((food, index) => {
    const li = document.createElement('li');
    li.className = 'flex justify-between items-center bg-gray-50 p-2 rounded';

    li.innerHTML = `
      <span>${food.name} - ${food.calories} cal</span>
      <button onclick="removeFood(${index})" class="bg-red-400 text-white px-2 rounded">X</button>
    `;

    list.appendChild(li);
  });

  updateTotal();
}

// Add food
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('food-name').value;
  let calories = document.getElementById('food-calories').value;

  // Simulated fetch API (mock)
  const response = await fetch('https://jsonplaceholder.typicode.com/posts/1');
  const data = await response.json();

  // Just simulate (no real calories from API)
  calories = parseInt(calories);

  foods.push({ name, calories });

  saveData();
  renderFoods();

  form.reset();
});

// Remove food
function removeFood(index) {
  foods.splice(index, 1);
  saveData();
  renderFoods();
}

// Update total
function updateTotal() {
  const total = foods.reduce((sum, food) => sum + food.calories, 0);
  totalDisplay.textContent = total;
}

// Reset
resetBtn.addEventListener('click', () => {
  foods = [];
  saveData();
  renderFoods();
});

// Initial render
renderFoods();
</script>

</body>
</html>
